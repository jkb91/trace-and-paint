<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trace PWA Canvas Test</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        font-family: "Trebuchet MS", "Avenir Next", sans-serif;
        background: #f3f5f7;
        color: #111;
      }

      h1,
      p {
        margin: 0 0 16px;
      }

      .stack {
        display: grid;
        gap: 24px;
        max-width: 440px;
      }

      canvas,
      img {
        display: block;
        width: 400px;
        height: 600px;
        background: #fff;
        border: 1px solid #c7cdd4;
      }

      pre {
        margin: 0;
        padding: 12px;
        background: #fff;
        border: 1px solid #d5dbe1;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <div class="stack">
      <div>
        <h1>Canvas Render Test</h1>
        <p>This page draws the demo flower directly to a canvas and also renders the same PNG data URL through an image element.</p>
      </div>
      <div>
        <p>Direct canvas</p>
        <canvas id="canvas" width="400" height="600"></canvas>
      </div>
      <div>
        <p>PNG from <code>toDataURL()</code></p>
        <img id="preview" alt="Canvas PNG preview">
      </div>
      <div>
        <p>Validation</p>
        <pre id="output"></pre>
      </div>
    </div>
    <script>
      const W = 400;
      const H = 600;
      const canvas = document.getElementById("canvas");
      const ctx = canvas.getContext("2d");

      function drawDemoFlower(target) {
        target.clearRect(0, 0, W, H);
        target.strokeStyle = "#000";
        target.lineWidth = 5;
        target.lineCap = "round";
        target.lineJoin = "round";

        const cx = 200;
        const cy = 300;

        target.beginPath();
        target.arc(cx, cy, 80, 0, Math.PI * 2);
        target.stroke();

        const petals = [
          { x: 200, y: 150, r: 55 },
          { x: 330, y: 245, r: 55 },
          { x: 280, y: 395, r: 55 },
          { x: 120, y: 395, r: 55 },
          { x: 70, y: 245, r: 55 }
        ];

        petals.forEach((petal) => {
          target.beginPath();
          target.arc(petal.x, petal.y, petal.r, 0, Math.PI * 2);
          target.stroke();
        });

        target.beginPath();
        target.moveTo(200, 380);
        target.lineTo(200, 550);
        target.stroke();

        target.beginPath();
        target.moveTo(200, 430);
        target.quadraticCurveTo(255, 400, 290, 440);
        target.quadraticCurveTo(245, 455, 200, 430);
        target.stroke();

        target.beginPath();
        target.moveTo(200, 485);
        target.quadraticCurveTo(145, 455, 110, 495);
        target.quadraticCurveTo(155, 510, 200, 485);
        target.stroke();
      }

      drawDemoFlower(ctx);

      const imageData = ctx.getImageData(0, 0, W, H);
      let nonTransparentPixels = 0;
      for (let index = 3; index < imageData.data.length; index += 4) {
        if (imageData.data[index] !== 0) {
          nonTransparentPixels += 1;
        }
      }

      const pngDataUrl = canvas.toDataURL("image/png");
      document.getElementById("preview").src = pngDataUrl;
      document.getElementById("output").textContent = JSON.stringify(
        {
          canvasWidth: canvas.width,
          canvasHeight: canvas.height,
          pngLength: pngDataUrl.length,
          pngPrefix: pngDataUrl.slice(0, 48),
          nonTransparentPixels
        },
        null,
        2
      );
    </script>
  </body>
</html>
